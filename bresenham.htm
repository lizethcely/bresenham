<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algoritmo de Bresenham</title>
    <style>
    body{font-family:"Arial", sans-serif; text-align: center; background-color: rgb(255, 195, 195);}
    canvas{border:1px solid black;margin-top:20px;}

    </style>
</style>
</head>
<input>
<body>
    <h2>Algoritmo de Bresenham</h2>

<label>x0:</label>
<input id="x0">

<label>y0:</label>
<input id="y0">

<label>x1:</label>
<input id="x1">

<label>y1:</label>
<input id="y1">

<button>Dibujar</button>

<canvas id="canvas" width="500" height="500"></canvas>
<script>
    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext;
    let escala = 20;

    function dibujarEscala(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.beginPath();

        for(let i=0;i<canvas.width;i+=escala){
        ctx.moveTo(i,0);
        ctx.lineTo(i,canvas.height);
        ctx.fillText(i/escala,i+2,495);
    }
        for(let j=0;j<canvas.height;j+=escala){
        ctx.moveTo(0,j);
        ctx.lineTo(canvas.width,j);
        ctx.fillText(j/escala,2,j);
        }

        ctx.stroke();
    }

    function plot(x,y){
        ctx.fillRect(x*escala,y*escala,escala,escala);
    }

    function dibujarLinea(){
        let x0 = parseInt(document.getElementById("x0").value);
        let x1 = parseInt(document.getElementById("x1").value);
        let y0 = parseInt(document.getElementById("y0").value);
        let y1 = parseInt(document.getElementById("y1").value);
        
        bresenham(x0,y0,x1,y1);
    }

    function bresenham (x0,y0,x1,y1){
        let dx = Math.abs(x1-x0);
        let dy = Math.abs(y1-y0);

        let sx= (x0<x1)?1:-1;
        let sy= (y0<y1)?1:-1;

        let err = dx-dy;
        
        let paso = 0;
        let tabla = document.querySelector("#tabla tbody");
        tabla.innerHTML = "";
    }

    while(true){
        plot(x0,y0);

        tabla.innerHTML += `
        <tr>
        <td>${paso}</td>
        <td>${x0}</td>
        <td>${y0}</td>
        <td>${err}</td>
        </tr>
        `;

        if(x0===x1 && y0===y1) break;
        let e2 = 2*err;

        if(e2>-dy){
           err -= dy;
           x0 += sx;
        }

        if(e2<dx){
           err += dx;
           y0 += sy;
        }
        paso ++;
    }

    dibujarEscala();
</script>
</body>
</html>
